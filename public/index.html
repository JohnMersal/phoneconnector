<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CRM Dialer</title>
    <style>
        /* Reset and Box Model */
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; /* Space between info, button, and footer */
            height: 100vh; 
            margin: 0; 
            padding: 40px 0; /* Added padding for top/bottom breathing room */
            transition: background-color 0.2s;
            overflow: hidden; /* Prevent accidental scrolling */
        }

        .info { 
            font-size: 14px; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-align: center;
        }

        #dial-btn {
            width: 85%; 
            height: 55vh; /* Adjusted slightly for better aspect ratio on long phones */
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #2ecc71; 
            color: white;
            text-decoration: none; 
            font-size: 42px; 
            font-weight: 800;
            border-radius: 30px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            border: 4px solid rgba(255,255,255,0.1);
            user-select: none; /* Prevent text selection on long press */
            -webkit-tap-highlight-color: transparent; /* Remove the blue flash on tap */
        }

        #dial-btn:active { 
            background: #27ae60; 
            transform: scale(0.96); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .footer { 
            color: #444; 
            font-size: 12px; 
            text-align: center;
        }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); 
            z-index: 100;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 22px; 
            line-height: 1.5;
            font-weight: bold; 
            color: #2ecc71;
            text-align: center; 
            cursor: pointer;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        TAP ANYWHERE TO <br> START RECEIVING LEADS
    </div>

    <div class="info" id="status-label">Ready to Call</div>
    
    <a id="dial-btn" href="javascript:void(0)">Waiting...</a>
    
    <div class="footer" id="last-sync">Last sync: Never</div>

    <script>
        const btn = document.getElementById('dial-btn');
        const sync = document.getElementById('last-sync');
        const overlay = document.getElementById('overlay');
        let currentNum = "";
        let vibrationUnlocked = false;

        let userId = window.location.hash.substring(1).toLowerCase();
        if (!userId) {
            userId = prompt("Enter your Unique ID (e.g., john):");
            if (userId) window.location.hash = userId;
        }

        window.addEventListener('click', () => {
            if (!vibrationUnlocked) {
                vibrationUnlocked = true;
                overlay.style.display = 'none';
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }, { once: true });

        async function update() {
            if (!userId) return;
            try {
                const response = await fetch(`/get-number/${userId}`);
                const data = await response.json();
                
                if (currentNum === "" && data.phone !== "No number yet") {
                    currentNum = data.phone;
                    btn.innerText = data.phone;
                    btn.href = "tel:" + data.phone.replace(/\D/g, '');
                    return;
                }

                if (data.phone && data.phone !== currentNum && data.phone !== "No number yet") {
                    currentNum = data.phone;
                    btn.innerText = data.phone;
                    btn.href = "tel:" + data.phone.replace(/\D/g, '');
                    sync.innerText = `User: ${userId} | Sync: ` + new Date().toLocaleTimeString();
                    
                    document.body.style.backgroundColor = "#2ecc71";
                    setTimeout(() => { document.body.style.backgroundColor = "#000"; }, 400);
                    
                    if (vibrationUnlocked && navigator.vibrate) {
                        navigator.vibrate([500, 100, 500]);
                    }
                }
            } catch (e) { console.error("Polling error:", e); }
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
