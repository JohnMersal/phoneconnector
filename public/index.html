<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dialer</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; background: #f4f4f9;
        }
        h2 { color: #333; margin-bottom: 20px; }
        #dial-btn {
            display: block; width: 80%; max-width: 300px; padding: 30px 20px;
            background: #2ecc71; color: white; text-align: center;
            text-decoration: none; font-size: 28px; font-weight: bold;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #dial-btn:active { transform: scale(0.95); background: #27ae60; }
        .status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Ready to Call:</h2>
    <a id="dial-btn" href="tel:">Waiting...</a>
    <div class="status" id="status">Last synced: Just now</div>

    <script>
        const btn = document.getElementById('dial-btn');
        const statusEl = document.getElementById('status');
        let currentPhone = "";

        async function updateNumber() {
            try {
                const response = await fetch('/get-number');
                const data = await response.json();
                
                if (data.phone && data.phone !== currentPhone) {
                    currentPhone = data.phone;
                    // Clean number for the tel link (remove dashes/spaces)
                    const cleanPhone = data.phone.replace(/\D/g, '');
                    
                    btn.innerText = data.phone;
                    btn.href = `tel:${cleanPhone}`;
                    statusEl.innerText = "Updated: " + new Date().toLocaleTimeString();
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        // Poll every 1 second for fast response
        setInterval(updateNumber, 1000);
    </script>
</body>
</html>
