<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CRM Dialer</title>
    <style>
        body { 
            font-family: -apple-system, system-ui; 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
            transition: background-color 0.2s;
        }
        #dial-btn {
            width: 85%; height: 60vh;
            display: flex; align-items: center; justify-content: center;
            background: #2ecc71; color: white;
            text-decoration: none; font-size: 42px; font-weight: 800;
            border-radius: 30px; text-align: center;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            border: 5px solid rgba(255,255,255,0.2);
        }
        #dial-btn:active { background: #27ae60; transform: scale(0.98); }
        .info { margin-bottom: 20px; font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .footer { margin-top: 20px; color: #444; font-size: 12px; }
        
        /* Overlay to force the first tap */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: #2ecc71;
            text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">TAP ANYWHERE TO <br>UNLOCK VIBRATION</div>

    <div class="info" id="status-label">Ready to Call</div>
    <a id="dial-btn" href="javascript:void(0)">Waiting...</a>
    <div class="footer" id="last-sync">Last sync: Never</div>

    <script>
       // 2. Arm the vibration motor on the first click
window.addEventListener('click', () => {
    if (!vibrationUnlocked) {
        vibrationUnlocked = true;
        
        // THIS LINE WAS MISSING OR NOT TARGETING THE ID CORRECTLY:
        document.getElementById('overlay').style.display = 'none';
        
        console.log("Vibration motor armed for user:", userId);
        if (navigator.vibrate) navigator.vibrate(100); // Quick test buzz
    }
}, { once: true });

// 3. Main Polling Function
async function update() {
    if (!userId) return;
    
    try {
        const response = await fetch(`/get-number/${userId}`);
        const data = await response.json();
        
        // If it's the first run and there's already a number, 
        // set it as current so we don't vibrate immediately on load
        if (currentNum === "" && data.phone !== "No number yet") {
            currentNum = data.phone;
            btn.innerText = data.phone;
            btn.href = "tel:" + data.phone.replace(/\D/g, '');
            return;
        }

        if (data.phone && data.phone !== currentNum && data.phone !== "No number yet") {
            currentNum = data.phone;
            
            btn.innerText = data.phone;
            btn.href = "tel:" + data.phone.replace(/\D/g, '');
            sync.innerText = `User: ${userId} | Sync: ` + new Date().toLocaleTimeString();
            
            document.body.style.backgroundColor = "#2ecc71";
            setTimeout(() => { document.body.style.backgroundColor = "#000"; }, 400);
            
            if (vibrationUnlocked && navigator.vibrate) {
                navigator.vibrate([500, 100, 500]);
            }
        }
    } catch (e) {
        console.error("Polling error:", e);
    }
}
    </script>
</body>
</html>
