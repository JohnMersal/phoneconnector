<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CRM Dialer</title>
    <style>
        body { 
            font-family: -apple-system, system-ui; 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
            transition: background-color 0.2s;
        }
        #dial-btn {
            width: 85%; height: 60vh;
            display: flex; align-items: center; justify-content: center;
            background: #2ecc71; color: white;
            text-decoration: none; font-size: 42px; font-weight: 800;
            border-radius: 30px; text-align: center;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            border: 5px solid rgba(255,255,255,0.2);
        }
        #dial-btn:active { background: #27ae60; transform: scale(0.98); }
        .info { margin-bottom: 20px; font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .footer { margin-top: 20px; color: #444; font-size: 12px; }
        
        /* Overlay to force the first tap */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: #2ecc71;
            text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">TAP ANYWHERE TO <br>UNLOCK VIBRATION</div>

    <div class="info" id="status-label">Ready to Call</div>
    <a id="dial-btn" href="javascript:void(0)">Waiting...</a>
    <div class="footer" id="last-sync">Last sync: Never</div>

    <script>
        const btn = document.getElementById('dial-btn');
        const sync = document.getElementById('last-sync');
        const overlay = document.getElementById('overlay');
        const statusLabel = document.getElementById('status-label');
        let currentNum = "";
        let canVibrate = false;

        // Unlock vibration on first tap
        window.addEventListener('click', () => {
            canVibrate = true;
            overlay.style.display = 'none';
            if (navigator.vibrate) navigator.vibrate(100); // Confirmation buzz
            console.log("Vibration active");
        }, { once: true });

        async function update() {
            try {
                const r = await fetch('/get-number');
                const d = await r.json();
                
                if (d.phone && d.phone !== currentNum && d.phone !== "No number yet") {
                    currentNum = d.phone;
                    const clean = d.phone.replace(/\D/g, '');
                    
                    btn.innerText = d.phone;
                    btn.href = "tel:" + clean;
                    sync.innerText = "Updated: " + new Date().toLocaleTimeString();
                    
                    // Visual Flash
                    document.body.style.backgroundColor = "#2ecc71";
                    setTimeout(() => { document.body.style.backgroundColor = "#000"; }, 400);

                    // Vibration Pattern: 500ms on, 100ms off, 500ms on
                    if (canVibrate && navigator.vibrate) {
                        navigator.vibrate([500, 100, 500]);
                    }
                }
            } catch(e) {
                console.error("Sync error", e);
            }
        }

        // Fast polling for real-time feel
        setInterval(update, 1000);
    </script>
</body>
</html>
