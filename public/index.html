<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CRM Dialer</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh; margin: 0; 
            padding: 20px 0 40px 0; transition: background-color 0.2s;
            overflow: hidden;
        }

        .info { 
            font-size: 14px; color: #666; text-transform: uppercase; 
            letter-spacing: 2px; text-align: center; margin-top: 10px;
        }

        .button-container {
            width: 85%; display: flex; flex-direction: column;
            gap: 15px; align-items: center;
        }

        #dial-btn {
            width: 100%; height: 50vh; display: flex; 
            align-items: center; justify-content: center;
            background: #2ecc71; color: white; text-decoration: none; 
            font-size: 38px; font-weight: 800; border-radius: 30px; 
            text-align: center; box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            border: 4px solid rgba(255,255,255,0.1);
            -webkit-tap-highlight-color: transparent;
        }

        #copy-btn {
            width: 100%; height: 10vh; display: none; 
            align-items: center; justify-content: center;
            background: #333; color: #fff; text-decoration: none;
            font-size: 18px; font-weight: 600; border-radius: 20px;
            border: 1px solid #444;
            -webkit-tap-highlight-color: transparent;
        }

        #dial-btn:active { transform: scale(0.96); filter: brightness(0.9); }
        #copy-btn:active { background: #444; transform: scale(0.98); }

        .footer { color: #444; font-size: 12px; text-align: center; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; line-height: 1.5; font-weight: bold; 
            color: #2ecc71; text-align: center; cursor: pointer; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">TAP ANYWHERE TO <br> START RECEIVING LEADS</div>

    <div class="info" id="status-label">Ready to Call</div>
    
    <div class="button-container">
        <a id="dial-btn" href="javascript:void(0)">Waiting...</a>
        <button id="copy-btn">Copy Number (002)</button>
    </div>
    
    <div class="footer" id="last-sync">Last sync: Never</div>

    <script>
        const btn = document.getElementById('dial-btn');
        const copyBtn = document.getElementById('copy-btn');
        const sync = document.getElementById('last-sync');
        const overlay = document.getElementById('overlay');
        let currentNum = "";
        let formattedIntl = "";
        let vibrationUnlocked = false;

        let userId = window.location.hash.substring(1).toLowerCase();
        if (!userId) {
            userId = prompt("Enter your Unique ID:");
            if (userId) window.location.hash = userId;
        }

        window.addEventListener('click', () => {
            if (!vibrationUnlocked) {
                vibrationUnlocked = true;
                overlay.style.display = 'none';
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }, { once: true });

        // Logic to ensure 002 prefix
        function formatInternational(num) {
            let clean = num.replace(/\D/g, ''); 
            if (!clean.startsWith('002')) {
                if (clean.startsWith('2')) {
                    clean = '00' + clean;
                } else {
                    clean = '002' + clean;
                }
            }
            return clean;
        }

        // Copy Function
        copyBtn.addEventListener('click', () => {
            if (!formattedIntl) return;
            navigator.clipboard.writeText(formattedIntl).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "COPIED! ✅";
                copyBtn.style.borderColor = "#2ecc71";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.borderColor = "#444";
                }, 1500);
            });
        });

        async function update() {
            if (!userId) return;
            try {
                const response = await fetch(`/get-number/${userId}`);
                const data = await response.json();
                
                const processNumber = (num) => {
                    currentNum = num;
                    formattedIntl = formatInternational(num);
                    
                    btn.innerText = num; 
                    btn.href = "tel:" + formattedIntl;

                    copyBtn.style.display = 'flex';
                    sync.innerText = `User: ${userId} | Sync: ` + new Date().toLocaleTimeString();
                };

                if (currentNum === "" && data.phone !== "No number yet") {
                    processNumber(data.phone);
                    return;
                }

                if (data.phone && data.phone !== currentNum && data.phone !== "No number yet") {
                    processNumber(data.phone);
                    document.body.style.backgroundColor = "#2ecc71";
                    setTimeout(() => { document.body.style.backgroundColor = "#000"; }, 400);
                    if (vibrationUnlocked && navigator.vibrate) navigator.vibrate([500, 100, 500]);
                }
            } catch (e) { console.error("Polling error:", e); }
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
