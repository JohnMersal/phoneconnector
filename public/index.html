<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CRM Dialer</title>
    <style>
        body { 
            font-family: -apple-system, system-ui; 
            background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
        }
        #dial-btn {
            width: 85%; height: 60vh;
            display: flex; align-items: center; justify-content: center;
            background: #2ecc71; color: white;
            text-decoration: none; font-size: 42px; font-weight: 800;
            border-radius: 30px; text-align: center;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            border: 5px solid rgba(255,255,255,0.2);
        }
        #dial-btn:active { background: #27ae60; transform: scale(0.98); }
        .info { margin-bottom: 20px; font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .footer { margin-top: 20px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div class="info">Ready to Call</div>
    <a id="dial-btn" href="javascript:void(0)">Waiting...</a>
    <div class="footer" id="last-sync">Syncing...</div>

    <script>
        const btn = document.getElementById('dial-btn');
        const sync = document.getElementById('last-sync');
        let currentNum = "";

        async function update() {
            try {
                const r = await fetch('/get-number');
                const d = await r.json();
                
                if (d.phone && d.phone !== currentNum && d.phone !== "No number yet") {
                    currentNum = d.phone;
                    const clean = d.phone.replace(/\D/g, '');
                    btn.innerText = d.phone;
                    // Pre-set the link
                    btn.href = "tel:" + clean;
                    sync.innerText = "Updated: " + new Date().toLocaleTimeString();
                    
                    // Optional: Vibrate phone when a new number arrives
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                }
            } catch(e) {}
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
